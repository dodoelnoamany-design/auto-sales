name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          npm ci
          npm run build

      - name: Capacitor Sync
        run: |
          npm install --no-save @capacitor/cli @capacitor/core
          npx cap sync android

      - name: Restore Keystore
        if: secrets.ANDROID_KEYSTORE != ''
        run: |
          echo "Restoring keystore..."
          mkdir -p android/app
          # فك تشفير المفتاح وحفظه باسم واضح
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > android/app/release-keystore.jks
          chmod 600 android/app/release-keystore.jks

      - name: Build Android (Gradle)
        working-directory: android
        env:
          # ربط السيكرتس بمتغيرات البيئة للاستخدام الآمن
          PW_STORE: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          PW_KEY: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          # بناء الـ APK وحقن بيانات التوقيع مباشرة في Gradle
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=app/release-keystore.jks \
            -Pandroid.injected.signing.store.password=$PW_STORE \
            -Pandroid.injected.signing.key.alias=$ALIAS \
            -Pandroid.injected.signing.key.password=$PW_KEY

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk